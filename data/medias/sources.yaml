# ── Ce que les positions des médias révèlent ────────────────────────
#
# Le paysage médiatique français est DÉSÉQUILIBRÉ :
#
# - La TV est massivement autoritaire (BFM -0.3, CNews -0.5, TF1 -0.2)
#   et plutôt libérale économiquement → biais "droite autoritaire"
# - La presse de référence (Le Monde, Libération) est plus progressiste
#   et libertaire → biais "gauche ouverte"
# - La radio est la plus centriste
# - Les réseaux sociaux amplifient les positions existantes
#
# Conséquence pour VoxCité :
# Si quelqu'un regarde principalement la TV et se retrouve autoritaire,
# la question est : est-ce sa conviction profonde, ou le reflet de ce
# qu'il entend tous les jours ?
# C'est EXACTEMENT la question que l'esprit critique doit poser.
