# VoxCité — Données de référence : Partis politiques français
#
# IMPORTANT : Ces positions sont des estimations éditoriales basées sur
# les programmes, votes parlementaires et discours publics.
# Elles doivent être affinées par un comité éditorial et seront
# transparentes pour les utilisateurs (méthodologie publiée).
#
# Échelle : -1.0 à +1.0 pour chaque axe
#   position_1d :    -1 = gauche, +1 = droite (classement éditorial traditionnel)
#   Sociétal :       -1 = conservateur, +1 = progressiste
#   Économique :     -1 = interventionniste, +1 = libéral
#   Autorité :       -1 = autoritaire, +1 = libertaire
#   Écologie :       -1 = productiviste, +1 = écologiste
#   Souveraineté :   -1 = souverainiste, +1 = mondialiste

partis:

  - id: npa
    label: "Nouveau Parti Anticapitaliste"
    abbreviation: "NPA"
    position_1d: -0.95
    position:
      societal: 0.9
      economic: -0.95
      authority: 0.7       # Autogestion, démocratie directe, anti-répression
      ecology: 0.7         # Écosocialisme, décroissance, anti-capitalisme vert
      sovereignty: -0.3    # Internationaliste mais anti-UE libérale
    color: "#B80000"
    leader: "Philippe Poutou"

  - id: lfi
    label: "La France Insoumise"
    abbreviation: "LFI"
    position_1d: -0.80
    position:
      societal: 0.7
      economic: -0.8
      authority: 0.3       # Libertaire sur les libertés civiles, verticale en interne
      ecology: 0.6         # Planification écologique, règle verte, bifurcation
      sovereignty: -0.4    # Souverainisme de gauche, désobéissance aux traités UE
    color: "#CC2443"
    leader: "Jean-Luc Mélenchon"

  - id: pcf
    label: "Parti Communiste Français"
    abbreviation: "PCF"
    position_1d: -0.75
    position:
      societal: 0.4
      economic: -0.9
      authority: -0.2      # Tradition centraliste, État fort, libertés syndicales
      ecology: 0.2         # Écologie industrielle, pro-nucléaire, emploi d'abord
      sovereignty: -0.3    # Souveraineté populaire, critique de l'UE libérale
    color: "#DD0000"
    leader: "Fabien Roussel"

  - id: eelv
    label: "Les Écologistes"
    abbreviation: "EELV"
    position_1d: -0.50
    position:
      societal: 0.8
      economic: -0.4
      authority: 0.6       # Désobéissance civile, démocratie participative
      ecology: 0.95        # Le plus écologiste — raison d'être du parti
      sovereignty: 0.4     # Pro-Europe, coopération internationale, climat mondial
    color: "#00A650"
    leader: "Marine Tondelier"

  - id: ps
    label: "Parti Socialiste"
    abbreviation: "PS"
    position_1d: -0.35
    position:
      societal: 0.5
      economic: -0.3
      authority: 0.2       # Modérément libertaire, institutionnel
      ecology: 0.3         # Écologie de compromis, transition sans rupture
      sovereignty: 0.5     # Pro-européen, multilatéralisme, institutions internationales
    color: "#FF6084"
    leader: "Olivier Faure"

  - id: modem
    label: "MoDem"
    abbreviation: "MoDem"
    position_1d: 0.10
    position:
      societal: 0.2
      economic: 0.3
      authority: 0.1       # Centriste, équilibre
      ecology: 0.2         # Écologie modérée, pragmatique
      sovereignty: 0.6     # Très pro-européen (Bayrou historiquement)
    color: "#FF8C00"
    leader: "François Bayrou"

  - id: renaissance
    label: "Renaissance"
    abbreviation: "RE"
    position_1d: 0.25
    position:
      societal: 0.3
      economic: 0.6
      authority: -0.5      # 49.3, état d'urgence, surveillance, verticalité
      ecology: 0.1         # Discours vert mais relance nucléaire, croissance verte
      sovereignty: 0.5     # Pro-UE, souveraineté européenne, OTAN
    color: "#FFEB00"
    leader: "Emmanuel Macron"

  - id: lr
    label: "Les Républicains"
    abbreviation: "LR"
    position_1d: 0.55
    position:
      societal: -0.4
      economic: 0.5
      authority: -0.5      # Ordre, autorité, sécurité, peines plus lourdes
      ecology: -0.4        # Productiviste, anti-écologie punitive, pro-nucléaire
      sovereignty: 0.2     # Pro-européen modéré mais souveraineté régalienne
    color: "#0066CC"
    leader: "Laurent Wauquiez"

  - id: rn
    label: "Rassemblement National"
    abbreviation: "RN"
    position_1d: 0.80
    position:
      societal: -0.8
      economic: -0.2
      authority: -0.7      # Police renforcée, anti-immigration, contrôle
      ecology: -0.5        # Anti-éolien, pro-voiture, climato-sceptique soft
      sovereignty: -0.8    # Très souverainiste — Frexit soft, anti-UE, anti-OTAN
    color: "#0D378A"
    leader: "Jordan Bardella"

  - id: reconquete
    label: "Reconquête"
    abbreviation: "R!"
    position_1d: 0.90
    position:
      societal: -0.9
      economic: 0.4
      authority: -0.8      # Le plus autoritaire — civilisationnel, identitaire
      ecology: -0.7        # Le plus productiviste — croissance, anti-décroissance
      sovereignty: -0.6    # Souverainiste civilisationnel mais pas anti-UE en bloc
    color: "#1A1A2E"
    leader: "Éric Zemmour"

# ── Ce que les 5 axes révèlent ─────────────────────────────────────
#
# ÉCOLOGIE :
#   EELV (0.95) vs R! (-0.7) → l'écart le plus grand de tous les axes
#   PCF (0.2) vs LFI (0.6) → la gauche est divisée sur l'écologie
#   RE (0.1) → discours vert mais position quasi-neutre
#
# SOUVERAINETÉ :
#   RN (-0.8) vs PS (0.5) → clivage massif
#   LFI (-0.4) et RN (-0.8) → les deux sont souverainistes !
#     C'est le 2ème point commun du bloc populaire (après l'économie)
#   EELV (0.4) vs LFI (-0.4) → la gauche est divisée sur l'Europe
#
# COMBINAISONS SURPRENANTES :
#   RE : progressiste + libéral + AUTORITAIRE + neutre écologie + mondialiste
#   RN : conservateur + interventionniste + AUTORITAIRE + productiviste + SOUVERAINISTE
#   LFI : progressiste + interventionniste + libertaire + écologiste + SOUVERAINISTE
#   → LFI et RN partagent 2 axes sur 5 (économique + souveraineté)
#     mais divergent sur 3 (sociétal, autorité, écologie)
