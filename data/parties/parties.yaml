# Note sur la thèse fondatrice de VoxCité :
#
# Le score 1D (gauche-droite) est le classement éditorial traditionnel,
# tel qu'utilisé par les médias et les sondeurs. Il est VOLONTAIREMENT
# réducteur — c'est précisément ce que VoxCité démonte.
#
# Exemples de ce que l'axe unique cache :
# - Le RN est classé "extrême droite" mais est interventionniste économiquement
#   → plus proche de LFI que de LR sur l'axe économique
# - Renaissance est classé "centre" mais est libéral économiquement
#   → plus proche de LR que du MoDem sur l'axe économique
# - LFI et RN partagent un électorat populaire (anti-libéral)
#   mais sont fracturés par les sujets sociétaux
#
# C'est exactement la fracturation que VoxCité rend visible.
