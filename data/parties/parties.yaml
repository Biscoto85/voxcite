# VoxCité — Données de référence : Partis politiques français
# Positionnement sur le compas
#
# IMPORTANT : Ces positions sont des estimations éditoriales basées sur
# les programmes, votes parlementaires et discours publics.
# Elles doivent être affinées par un comité éditorial et seront
# transparentes pour les utilisateurs (méthodologie publiée).
#
# Échelle : -1.0 à +1.0
#   position_1d : -1 = gauche, +1 = droite (classement éditorial traditionnel)
#   Sociétal :    -1 = conservateur, +1 = progressiste
#   Économique :  -1 = interventionniste, +1 = libéral

