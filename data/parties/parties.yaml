# Note sur la thèse fondatrice de VoxCité :
#
# En regardant cette carte, on voit immédiatement ce que l'axe unique cache :
#
# - LFI et RN sont tous les deux "anti-système" mais aux antipodes sur le sociétal
# - Renaissance et LR sont proches économiquement mais opposés sur le sociétal
# - RN et LFI partagent un électorat populaire (économique proche)
#   mais sont fracturés sur les sujets sociétaux
#
# C'est exactement la fracturation que VoxCité rend visible :
# le bloc populaire (anti-libéral économiquement) est divisé en deux
# par les sujets identitaires/sociétaux, au profit du bloc libéral
# qui reste uni (Renaissance + LR + Reconquête sur l'axe économique).
