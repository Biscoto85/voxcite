<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Favicon PartiPrism — Simplified prism with spectral hint -->

  <!-- Dark background circle -->
  <rect width="32" height="32" rx="6" fill="#0A0A0F"/>

  <!-- Prism triangle -->
  <polygon points="8,6 8,26 24,26" fill="none" stroke="#F5B731" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Glass fill -->
  <polygon points="8,6 8,26 24,26" fill="#F5B731" fill-opacity="0.1"/>

  <!-- Spectral rays (simplified — 3 main colors) -->
  <line x1="20" y1="19" x2="29" y2="11" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="22" x2="29" y2="18" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="24.5" x2="29" y2="25" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
</svg>
