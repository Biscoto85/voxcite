# PartiPrism — Nginx config
# À copier dans : /etc/nginx/sites-available/partiprism.fr
# puis : ln -s /etc/nginx/sites-available/partiprism.fr /etc/nginx/sites-enabled/
# puis : sudo nginx -t && sudo systemctl reload nginx
# puis : sudo certbot --nginx -d partiprism.fr -d www.partiprism.fr

server {
    listen 80;
    listen [::]:80;
    server_name partiprism.fr www.partiprism.fr;

    # Redirection HTTP → HTTPS (ajouté automatiquement par Certbot)
    # En attendant le certificat SSL, on sert directement
    # return 301 https://$host$request_uri;

    root /var/www/partiprism/packages/client/dist;
    index index.html;

    # ── API reverse proxy → PM2 (port 3001) ─────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Assets statiques (Vite build) ────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — toutes les routes vers index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Sécurité ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limiter la taille des requêtes (upload)
    client_max_body_size 1m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
